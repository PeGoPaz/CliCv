<!DOCTYPE html>
<html lang="en" data-theme="ghost">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vladimir Rainov — Software Engineer portfolio. Computing Science student at Griffith College Dublin." />
  <meta name="author" content="Vladimir Rainov" />
  <meta name="keywords" content="software engineer, developer, portfolio, Dublin, Griffith College, cloud, DevOps, Linux" />
  <title>Vladimir Rainov — Software Engineer Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/terminal.css" />
</head>
<body>
  <canvas id="matrix-bg"></canvas>

  <!-- Main terminal window -->
  <main class="terminal-container">
    <header class="terminal-header">
      <span class="terminal-title">guest@portfolio — <span id="shell-name">zsh</span></span>
      <span class="theme-label" id="themeLabel">Ghost</span>
    </header>

    <section class="terminal-body" id="terminalBody" aria-label="Terminal output">
      <!-- Boot sequence and command output injected here -->
    </section>

    <footer class="terminal-input-row">
      <span class="prompt">
        <span class="prompt-user">guest</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-separator">:</span><span class="prompt-path">~</span><span class="prompt-sign">❯</span>
      </span>
      <input
        type="text"
        id="commandInput"
        class="command-input"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Terminal command input"
      />
    </footer>

    <div class="status-bar">
      <div class="status-left">
        <span class="status-item available">● available</span>
        <span class="status-divider">|</span>
        <span class="status-item" id="historyCount">hist: 0</span>
      </div>
      <div class="status-center">
        <span class="shortcut">↑↓ history</span>
        <span class="shortcut">tab complete</span>
      </div>
      <div class="status-right">
        <span class="status-item theme-current" id="statusTheme">Ghost</span>
      </div>
    </div>
  </main>

  <!-- Compiled JS -->
  <script type="module" src="dist/main.js"></script>
</body>
</html>
